<div class="modal fade" id="modalDownload" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <form action="{% url 'laporan_excel' %}" method="GET"> 
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold"><i class="fas fa-file-excel me-2"></i>Download Laporan Excel</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted mb-4">Pilih rentang tanggal untuk mengunduh laporan Excel (4 Sheet).</p>
                    
                    <div class="mb-3">
                        <label class="fw-bold form-label">Dari Tanggal</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold form-label">Sampai Tanggal</label>
                        <input type="date" name="end_date" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-success fw-bold">
                        <i class="fas fa-download me-1"></i> Download
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
