<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Laporan Excel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">📊 Export Laporan ke Excel</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted">Pilih rentang tanggal untuk mendownload laporan tamu dalam format Excel (.xlsx)</p>
                    
                    <form action="" method="GET">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Dari Tanggal:</label>
                            <input type="date" name="start_date" class="form-control" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Sampai Tanggal:</label>
                            <input type="date" name="end_date" class="form-control" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                📥 DOWNLOAD EXCEL
                            </button>
                            <a href="{% url 'daftar_tamu' %}" class="btn btn-outline-secondary">
                                Kembali ke Dashboard
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
